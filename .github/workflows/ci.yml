name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check varoascii/

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install .[docs] pytest pytest-cov
      - run: pip install .
      - name: Smoke test - CLI loads
        run: echo "VaroASCII" | python -m varoascii --help
      - name: Smoke test - all effects discoverable
        run: python -c "import varoascii.effects; print('All effects loaded OK')"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t varoascii:test .
      - run: echo "Docker OK" | docker run -i varoascii:test --help
